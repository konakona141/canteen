spring:
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/community_canteen?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: google.com1
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件最大限制
      max-request-size: 10MB   # 单次请求最大限制
  # 自定义上传路径配置（用于后端读取）
  file:
    upload-path: D:/canteen_uploads/
    access-path: /uploads/**
    #上传文件路径

logging:
  level:
    logger.org.springframework.boot.StartupInfoLogger: OFF

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
