<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>邻里食堂 | 身份验证</title>
    <script src="js/vue.global.js"></script>
    <script src="js/axios.min.js"></script>
    <script src="js/md5.min.js"></script>
    <style>
        :root { --main-orange: #ff6b01; --bg-gradient: linear-gradient(135deg, #f6f8fb 0%, #e5ebee 100%); }

        body { margin: 0; padding: 0; font-family: "PingFang SC", "Hiragino Sans GB", sans-serif; background: var(--bg-gradient); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* 主容器 - 桌面端 */
        .auth-container { width: 960px; height: 600px; background: white; border-radius: 24px; display: flex; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); transition: all 0.3s ease; }

        /* 左侧宣传位 */
        .auth-side { flex: 1.2; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('img/photo-1547592166-23ac45744acd.avif'); background-size: cover; background-position: center; padding: 60px; color: white; display: flex; flex-direction: column; justify-content: flex-end; }
        .auth-side h1 { font-size: 42px; margin: 0; font-weight: 900; }
        .auth-side p { font-size: 18px; margin-top: 15px; opacity: 0.9; line-height: 1.6; }

        /* 右侧表单区 */
        .auth-form-box { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .auth-header { margin-bottom: 35px; }
        .auth-header h2 { font-size: 28px; color: #1e293b; margin: 0; }
        .auth-header p { color: #64748b; margin-top: 10px; font-size: 14px; }

        /* 输入框样式 */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: bold; color: #475569; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px 16px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        .input-group input:focus { outline: none; border-color: var(--main-orange); background: #fffaf7; }

        /* 记住我 & 额外选项 */
        .extra-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 14px; color: #64748b; }
        .remember-me { display: flex; align-items: center; cursor: pointer; }
        .remember-me input { margin-right: 8px; cursor: pointer; accent-color: var(--main-orange); }

        /* 按钮样式 */
        .btn-submit { width: 100%; padding: 14px; background: var(--main-orange); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(255, 107, 1, 0.3); }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 切换链接 */
        .switch-hint { text-align: center; margin-top: 25px; font-size: 14px; color: #64748b; }
        .switch-hint a { color: var(--main-orange); text-decoration: none; font-weight: bold; margin-left: 5px; }

        /* 加载动画 */
        .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { background: #fff; align-items: flex-start; }
            .auth-container { width: 100%; height: 100vh; border-radius: 0; flex-direction: column; box-shadow: none; }
            .auth-side { flex: none; height: 200px; padding: 30px; justify-content: center; align-items: center; text-align: center; }
            .auth-side h1 { font-size: 28px; }
            .auth-side p { display: none; } /* 手机端隐藏长描述 */
            .auth-form-box { padding: 30px 24px; flex: 1; justify-content: flex-start; }
            .auth-header { margin-bottom: 25px; }
            .auth-header h2 { font-size: 24px; }
            .input-group input { padding: 14px; }
            .switch-hint { margin-top: auto; padding-bottom: 20px; }
        }
    </style>
</head>
<body>

<div id="app" class="auth-container">
    <div class="auth-side">
        <h1>🍱 邻里食堂</h1>
        <p>每一份餐点，都承载着邻里间的温情。<br>新鲜、健康、便捷，就在您身边。</p>
    </div>

    <div class="auth-form-box">
        <div class="auth-header">
            <h2>{{ isLogin ? '欢迎回来' : '开启美食之旅' }}</h2>
            <p>{{ isLogin ? '请登录以管理您的订单与菜品' : '简单几步，加入我们的社区食堂' }}</p>
        </div>

        <div class="input-group">
            <label>用户名</label>
            <input v-model="form.username" type="text" placeholder="输入用户名" autocomplete="username" @keyup.enter="handleSubmit">
        </div>

        <div class="input-group">
            <label>密码</label>
            <input v-model="form.password" type="password" placeholder="输入密码" autocomplete="current-password" @keyup.enter="handleSubmit">
        </div>

        <div v-if="!isLogin" class="input-group">
            <label>确认密码</label>
            <input v-model="confirmPassword" type="password" placeholder="再次输入密码" @keyup.enter="handleSubmit">
        </div>

        <div class="extra-options" v-if="isLogin">
            <label class="remember-me">
                <input type="checkbox" v-model="rememberMe"> 记住我
            </label>
            <a href="#" style="color: #64748b; text-decoration: none;">忘记密码？</a>
        </div>

        <button class="btn-submit" :disabled="loading" @click="handleSubmit">
            <span v-if="loading" class="spinner"></span>
            {{ loading ? '处理中...' : (isLogin ? '立即登录' : '提交注册') }}
        </button>

        <div class="switch-hint">
            {{ isLogin ? '还没有账号？' : '已有账号？' }}
            <a href="#" @click.prevent="isLogin = !isLogin">
                {{ isLogin ? '立即注册' : '返回登录' }}
            </a>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
        setup() {
            const isLogin = ref(true);
            const loading = ref(false);
            const rememberMe = ref(false);
            const form = ref({
                username: '',
                password: ''
            });
            const confirmPassword = ref('');

            // 初始化检查记住的账号
            onMounted(() => {
                const savedUser = localStorage.getItem('rememberedUser');
                if (savedUser) {
                    form.value.username = savedUser;
                    rememberMe.value = true;
                }
            });

            const handleSubmit = async () => {
                // 基本校验
                if (!form.value.username || !form.value.password) {
                    alert("⚠️ 请完整填写用户名和密码");
                    return;
                }

                loading.value = true;

                // 前端预处理：MD5加密后传输，提高安全性
                const payload = {
                    username: form.value.username,
                    password: md5(form.value.password)
                };

                try {
                    if (isLogin.value) {
                        // --- 登录逻辑 ---
                        const res = await axios.post('/api/canteen/login', payload);

                        if (res.data.success) {
                            const userData = res.data.data;

                            // 记住我功能逻辑
                            if (rememberMe.value) {
                                localStorage.setItem('rememberedUser', form.value.username);
                            } else {
                                localStorage.removeItem('rememberedUser');
                            }

                            // 存储当前登录用户信息
                            localStorage.setItem('user', JSON.stringify({
                                username: userData.username,
                                role: userData.role,
                                id: userData.id
                            }));

                            // 角色化路由
                            if (userData.role === 'ADMIN') {
                                window.location.href = 'admin.html';
                            } else {
                                window.location.href = 'index.html';
                            }
                        } else {
                            alert("❌ 登录失败：" + (res.data.message || "用户名或密码错误"));
                        }
                    } else {
                        // --- 注册逻辑 ---
                        if (form.value.password !== confirmPassword.value) {
                            alert("⚠️ 两次输入的密码不一致");
                            loading.value = false;
                            return;
                        }

                        const res = await axios.post('/api/canteen/register', payload);

                        if (res.data.success) {
                            alert("🎉 注册成功！请使用新账号登录");
                            isLogin.value = true;
                            form.value.password = '';
                            confirmPassword.value = '';
                        } else {
                            alert("❌ 注册失败：" + (res.data.message || "用户名已被占用"));
                        }
                    }
                } catch (error) {
                    console.error("网络或服务器异常:", error);
                    alert("🚨 无法连接到服务器，请稍后再试");
                } finally {
                    loading.value = false;
                }
            };

            return { isLogin, form, confirmPassword, handleSubmit, loading, rememberMe };
        }
    }).mount('#app');
</script>

</body>
</html>
